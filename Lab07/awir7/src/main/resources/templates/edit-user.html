<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav style="display:flex; gap:.75rem; align-items:center; margin-bottom:1rem;">
    <a th:href="@{/users/list}">Lista</a>
    <a th:href="@{/users/new}">Dodaj</a>
    <form th:action="@{/logout}" method="post" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Wyloguj</button>
    </form>
</nav>
<h2>Edytuj użytkownika</h2>
<form th:action="@{|/users/${user.id}/edit|}" th:object="${user}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <p>Imię: <input th:field="*{name}"/></p>
    <p>Email: <input th:field="*{email}"/></p>
    <button type="submit">Zapisz zmiany</button>
</form>
</body>
</html>
