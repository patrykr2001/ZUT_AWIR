<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<body>
<nav style="display:flex; gap:.75rem; align-items:center; margin-bottom:1rem;">
    <a th:href="@{/users/list}">Lista</a>
    <a th:href="@{/users/new}">Dodaj</a>
    <a th:href="@{/me}">Mój profil</a>
    <form th:action="@{/logout}" method="post" style="margin:0;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Wyloguj</button>
    </form>
</nav>
<h2>Lista użytkowników</h2>
<table style="border: 1px solid black">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Akcje</th>
    </tr>
    <tr th:each="u : ${users}">
        <td th:text="${u.id}"></td>
        <td th:text="${u.name}"></td>
        <td th:text="${u.email}"></td>
        <td>
            <a th:href="@{|/users/${u.id}/edit|}">Edytuj</a>
            <form th:action="@{|/users/${u.id}/delete|}"
                  method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">Usuń</button>
            </form>
        </td>
    </tr>
</table>
<a th:href="@{/users/new}">Dodaj nowego użytkownika</a>
</body>
</html>
